<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTZ Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════ RESET + TOKENS ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme:light !important;
  --red:#D11000;
  --dark:#111418;
  --dark2:#1a1f28;
  --bg:#edecea;
  --card:#ffffff;
  --border:#dedad3;
  --border2:#c8c3bb;
  --text:#0f1117;
  --text2:#2d3340;
  --muted:#717680;
  --muted2:#a0a6b0;
  --radius:16px;
  --tr:.22s cubic-bezier(.4,0,.2,1);
  --tr-slow:.38s cubic-bezier(.4,0,.2,1);
}
html{color-scheme:light !important}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ═══════════════ HEADER ═══════════════ */
header{
  background:rgba(255,255,255,.88);padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  height:62px;position:sticky;top:0;z-index:100;
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 20px rgba(0,0,0,.08);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.header-left{display:flex;align-items:center;gap:13px}
.logo-mark{
  width:38px;height:38px;
  background:linear-gradient(135deg,#e81000,#a50c00);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;flex-shrink:0;
  box-shadow:0 3px 12px rgba(209,16,0,.35);
  transition:transform var(--tr),box-shadow var(--tr);cursor:default;
  position:relative;overflow:hidden;
}
/* shiny sweep */
.logo-mark::before{
  content:'';position:absolute;top:0;left:-80%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
  transform:skewX(-18deg);transition:left .5s ease;pointer-events:none;z-index:2;
}
.logo-mark:hover::before{left:140%}
/* glass shine top */
.logo-mark::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,.28) 0%,transparent 55%);
  border-radius:10px;pointer-events:none;z-index:1;
}
.logo-mark img{width:100%;height:100%;object-fit:contain;border-radius:8px;display:block;position:relative;z-index:0}
.logo-mark:hover{
  transform:scale(1.12) rotate(-6deg);
  box-shadow:0 6px 22px rgba(209,16,0,.55),0 0 30px rgba(209,16,0,.3);
}
.header-titles h1{font-size:14.5px;font-weight:800;color:var(--text);line-height:1.2;letter-spacing:-.01em}
.header-titles p{font-size:10.5px;color:var(--muted);margin-top:1px;font-weight:400}
.header-right{font-size:11px;color:var(--muted);text-align:right;line-height:1.65;margin-right:4px}
.header-right strong{color:var(--text2);font-weight:600;font-size:11.5px}
.header-actions{display:flex;align-items:center;gap:6px}
.btn-icon{
  width:33px;height:33px;border-radius:9px;
  border:1px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--muted);
  transition:all var(--tr);
}
.btn-icon:hover{background:var(--bg);border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.btn-icon:active{transform:scale(.88)}

/* ═══════════════ HERO ═══════════════ */
.hero{
  background:linear-gradient(135deg,#111418 0%,#1c2436 55%,#111418 100%);
  padding:54px 40px 50px;text-align:center;position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;top:-100px;right:-80px;width:420px;height:420px;background:radial-gradient(circle,rgba(209,16,0,.18) 0%,transparent 70%);border-radius:50%;animation:glowPulse 4s ease-in-out infinite}
.hero::after{content:'';position:absolute;bottom:-120px;left:-70px;width:320px;height:320px;background:radial-gradient(circle,rgba(209,16,0,.07) 0%,transparent 70%);border-radius:50%;animation:glowPulse 4s ease-in-out infinite reverse}
@keyframes glowPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
/* subtle grid texture */
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.hero-inner{position:relative;z-index:1;max-width:640px;margin:0 auto}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(209,16,0,.14);border:1px solid rgba(209,16,0,.32);
  color:#f87060;font-size:10.5px;font-weight:700;
  padding:4px 14px;border-radius:20px;margin-bottom:18px;letter-spacing:.08em;
  text-transform:uppercase;
  backdrop-filter:blur(8px);
  box-shadow:0 0 20px rgba(209,16,0,.2),inset 0 1px 0 rgba(255,255,255,.1);
  position:relative;overflow:hidden;
}
.hero-badge::before{
  content:'';position:absolute;top:0;left:-70%;width:45%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
  animation:badgeSweep 3.8s ease-in-out infinite;pointer-events:none;
}
@keyframes badgeSweep{0%,100%{left:-70%}55%{left:140%}}
.hero h2{
  font-size:36px;font-weight:800;color:#fff;
  line-height:1.2;margin-bottom:12px;letter-spacing:-.02em;
}
.hero h2 span{
  background:linear-gradient(90deg,#ff6050,#ff2010,#D11000);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(209,16,0,.5));
}
.hero p{font-size:13.5px;color:rgba(255,255,255,.42);line-height:1.8;margin-bottom:30px;font-weight:300}
.hero-stats{display:inline-flex;border:1px solid rgba(255,255,255,.14);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.05);backdrop-filter:blur(16px);box-shadow:0 4px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1)}
.stat{padding:13px 30px;text-align:center;cursor:pointer;transition:background var(--tr)}
.stat:hover{background:rgba(255,255,255,.06)}
.stat+.stat{border-left:1px solid rgba(255,255,255,.08)}
.stat .num{font-size:26px;font-weight:800;color:#fff;display:inline-block;transition:transform var(--tr),color var(--tr);letter-spacing:-.02em}
.stat:hover .num{transform:scale(1.18);color:#f87060;text-shadow:0 0 20px rgba(248,112,96,.6)}
.stat .lbl{font-size:10.5px;color:rgba(255,255,255,.32);margin-top:4px;font-weight:400;letter-spacing:.04em;text-transform:uppercase}

/* ═══════════════ SEARCH ═══════════════ */
.search-wrap{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:11px 40px}
.search-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:10px}
.search-box{flex:1;position:relative}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;opacity:.35}
.search-input{
  width:100%;height:38px;padding:0 36px 0 38px;
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'Be Vietnam Pro',sans-serif;font-size:12.5px;
  background:#faf9f8;color:var(--text);outline:none;
  transition:border-color var(--tr),box-shadow var(--tr),background var(--tr);
}
.search-input::placeholder{color:var(--muted2);font-weight:300}
.search-input:focus{border-color:var(--dark2);background:#fff;box-shadow:0 0 0 3px rgba(17,20,24,.07)}
.search-kbd{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:9.5px;color:var(--muted2);background:var(--bg);
  border:1px solid var(--border);border-radius:5px;padding:2px 6px;pointer-events:none;
}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;border-radius:50%;background:var(--muted2);color:#fff;
  border:none;font-size:10px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:background var(--tr),transform var(--tr);
}
.search-clear.show{display:flex}
.search-clear:hover{background:var(--dark);transform:translateY(-50%) scale(1.12)}
.search-count{font-size:12px;color:var(--muted);white-space:nowrap;background:var(--bg);border:1px solid var(--border);padding:5px 13px;border-radius:8px;font-weight:500;display:none}

/* ═══════════════ MAIN ═══════════════ */
main{flex:1;padding:30px 40px;max-width:1100px;width:100%;margin:0 auto}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.section-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.section-sub{font-size:12px;color:var(--muted);margin-top:3px;font-weight:400}
.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:5px}
.tab{
  padding:5px 14px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:transparent;color:var(--muted);
  font-family:inherit;transition:all var(--tr);letter-spacing:.01em;
}
.tab:hover{background:var(--bg);border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.tab:active{transform:scale(.93)}
.tab.active{background:var(--dark);color:#fff;border-color:var(--dark);box-shadow:0 2px 10px rgba(17,20,24,.22)}
.toolbar-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.sort-select{
  height:32px;padding:0 10px;border:1.5px solid var(--border);border-radius:9px;
  font-family:'Be Vietnam Pro',sans-serif;font-size:11.5px;font-weight:500;
  background:#fff;color:var(--text);cursor:pointer;outline:none;transition:border-color var(--tr);
}
.sort-select:hover,.sort-select:focus{border-color:var(--dark)}
.view-btns{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden}
.view-btn{
  width:32px;height:30px;border:none;background:transparent;cursor:pointer;
  font-size:13px;color:var(--muted);transition:all var(--tr);
  display:flex;align-items:center;justify-content:center;
}
.view-btn:hover{background:var(--bg);color:var(--text)}
.view-btn.active{background:var(--dark);color:#fff}

/* ═══════════════ GRID ═══════════════ */
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:18px}
.cert-grid.list-view{grid-template-columns:1fr}

/* ═══════════════ CARD — GRID MODE ═══════════════ */
.cert-card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  overflow:hidden;
  display:flex;flex-direction:column;
  position:relative;
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 10px rgba(0,0,0,.05);
  transition:transform var(--tr),box-shadow var(--tr),border-color var(--tr);
  animation:cardIn .32s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* COMING SOON — monochrome */
.cert-card.locked-card .card-thumb{filter:grayscale(1) brightness(.92);}
.cert-card.locked-card{border-color:#ddd}

/* COMING SOON with release date — hover enabled */
.cert-card.soon-dated{cursor:default;border-color:#ddd}
.cert-card.soon-dated:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 36px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
  border-color:var(--border2);
}
.cert-card.soon-dated .card-thumb{filter:grayscale(.6) brightness(.88);}
.cert-card.soon-dated:hover .card-thumb{filter:grayscale(.2) brightness(.95);}

/* Release countdown badge on thumb */
.badge-release{
  position:absolute;bottom:8px;left:8px;z-index:3;
  background:rgba(17,20,24,.72);color:#fff;
  font-size:9.5px;font-weight:600;padding:4px 10px;
  border-radius:20px;backdrop-filter:blur(6px);
  display:flex;align-items:center;gap:5px;
  border:1px solid rgba(255,255,255,.12);
}
.badge-release .cd-dot{
  width:5px;height:5px;border-radius:50%;
  background:#f87060;flex-shrink:0;
  animation:cdBlink 1s ease-in-out infinite;
}
@keyframes cdBlink{0%,100%{opacity:1}50%{opacity:.2}}

/* Release row in card body */
.release-row{
  margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:7px;
  font-size:10.5px;color:var(--muted);
}
.release-row .rel-icon{font-size:12px;flex-shrink:0}
.release-row .rel-label{color:var(--muted2);font-weight:500}
.release-row .rel-val{font-weight:600;color:var(--text2);margin-left:auto}
.release-row .rel-countdown{
  font-weight:700;color:var(--red);margin-left:auto;
  font-variant-numeric:tabular-nums;letter-spacing:.01em;
}

/* HOVER — active cards */
.cert-card.can-open{cursor:pointer}
.cert-card.can-open:hover{
  transform:translateY(-6px);
  box-shadow:0 16px 48px rgba(0,0,0,.16),0 3px 12px rgba(0,0,0,.08),0 0 0 1px rgba(255,255,255,.6);
  border-color:var(--border2);
}
.cert-card.can-open:active{transform:translateY(-2px) scale(.978)}

/* THUMB */
.card-thumb{
  height:160px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;flex-shrink:0;
  transition:height var(--tr-slow);
}
/* image thumb fills entire area */
.thumb-img-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  z-index:1;
  transition:padding var(--tr-slow);
}
.thumb-img{
  display:block;max-width:100%;max-height:100%;
  width:auto;height:auto;object-fit:contain;
  border-radius:8px;
  transition:transform var(--tr-slow);
}
/* zoom image on hover */
.cert-card.can-open:hover .thumb-img{transform:scale(1.12)}
/* centered image (no badge) — fill area, no padding */
.thumb-img-wrap.thumb-img-centered{
  padding:0;display:flex;align-items:center;justify-content:center;
}
.thumb-img-wrap.thumb-img-centered .thumb-img{
  width:100%;height:100%;object-fit:cover;border-radius:0;
}
/* full gradient when badge=null and no image */
.thumb-grad-full{position:absolute;inset:0;border-radius:0}
/* shiny sweep on thumb hover */
.card-thumb::after{
  content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transform:skewX(-15deg);transition:left 0s;pointer-events:none;z-index:4;
  opacity:0;
}
.cert-card.can-open:hover .card-thumb::after{
  left:140%;transition:left .55s ease;opacity:1;
}

/* emoji thumb */
.thumb-emoji{
  position:relative;z-index:1;font-size:52px;line-height:1;
  display:block;
  transition:transform var(--tr-slow),filter var(--tr-slow);
}
.cert-card.can-open:hover .thumb-emoji{transform:scale(1.14) rotate(-4deg)}

/* thumb gradient overlay */
.card-thumb-grad{
  position:absolute;inset:0;z-index:0;
  transition:opacity var(--tr-slow);
}

/* BADGES */
.badge-new{
  position:absolute;top:10px;right:10px;z-index:3;
  background:linear-gradient(135deg,#e81000,#b00c00);
  color:#fff;font-size:9.5px;font-weight:700;
  padding:3px 10px;border-radius:20px;letter-spacing:.06em;
  box-shadow:0 2px 8px rgba(209,16,0,.4);
}
.badge-soon{
  position:absolute;top:10px;right:10px;z-index:3;
  background:rgba(100,100,100,.7);color:#fff;
  font-size:9.5px;font-weight:600;padding:3px 10px;
  border-radius:20px;backdrop-filter:blur(6px);letter-spacing:.04em;
}
.badge-expiry-thumb{
  position:absolute;bottom:8px;left:8px;z-index:3;
  background:rgba(0,0,0,.5);color:#fff;
  font-size:10px;padding:3px 10px;border-radius:20px;
  backdrop-filter:blur(6px);
}

/* ── CARD BODY ── */
.card-body{
  padding:16px 18px 15px;flex:1;display:flex;flex-direction:column;
  transition:padding var(--tr-slow);
  background:#fff;position:relative;z-index:1;
}
.cert-card.can-open:hover .card-body{padding-top:13px;padding-bottom:13px}

.card-label-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card-category{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

.card-title{font-size:14.5px;font-weight:800;margin-bottom:2px;color:var(--text);line-height:1.3;letter-spacing:-.01em}
.card-title-en{font-size:10.5px;color:var(--muted2);font-style:italic;margin-bottom:9px;font-weight:300}
.card-desc{font-size:11.5px;color:var(--muted);line-height:1.7;flex:1;font-weight:400}
.expiry-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted)}
.expiry-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.expiry-dot.ok{background:#16a34a}.expiry-dot.warn{background:#f59e0b}.expiry-dot.dead{background:#dc2626}

.card-footer{margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-org{font-size:10.5px;color:var(--muted2);font-weight:400}
.btn-go{
  padding:7px 15px;border:none;border-radius:9px;
  font-family:inherit;font-size:11.5px;font-weight:700;cursor:pointer;
  transition:all var(--tr);display:flex;align-items:center;gap:5px;white-space:nowrap;
  letter-spacing:.01em;
}
.btn-go.open{
  background:linear-gradient(135deg,#1a1f28,#0d1117);
  color:#fff;box-shadow:0 2px 10px rgba(17,20,24,.25);
}
.btn-go.open:hover{background:linear-gradient(135deg,#252c38,#111720);box-shadow:0 4px 20px rgba(17,20,24,.38),0 0 0 1px rgba(255,255,255,.06);transform:translateY(-2px)}
.btn-go.open:active{transform:scale(.93)}
.btn-go.locked{background:#f0ede8;color:#b0a898;cursor:not-allowed;border:1px solid var(--border);font-weight:500}

/* ═══════════════ LIST VIEW — FIXED ═══════════════ */
.cert-grid.list-view .cert-card{
  flex-direction:row;
  height:auto;
  min-height:120px;
}
.cert-grid.list-view .card-thumb{
  width:160px;min-height:120px;flex-shrink:0;align-self:stretch;
}
.cert-grid.list-view .card-body{
  flex:1;padding:14px 18px;
  display:flex;flex-direction:column;justify-content:center;
  min-width:0;overflow:visible;
}
/* list hover: image zoom + body slight compress */
.cert-grid.list-view .cert-card.can-open:hover{transform:translateY(-3px)}
.cert-grid.list-view .cert-card.can-open:hover .thumb-img{transform:scale(1.1)}
.cert-grid.list-view .cert-card.can-open:hover .card-thumb{width:165px}
.cert-grid.list-view .cert-card.can-open:hover .card-body{padding-left:14px}
.cert-grid.list-view .card-title{font-size:14px}
.cert-grid.list-view .card-desc{
  display:block;overflow:visible;-webkit-line-clamp:unset;
}
.cert-grid.list-view .card-footer{margin-top:10px}
.cert-grid.list-view .expiry-row{margin-top:8px;padding-top:8px}

/* ═══════════════ HOVER EFFECT: text area shrinks ═══════════════ */
/* In grid view: thumb expands, body shrinks slightly via transform */
.cert-grid:not(.list-view) .cert-card.can-open .card-thumb{
  transition:height var(--tr-slow),transform var(--tr-slow);
}
.cert-grid:not(.list-view) .cert-card.can-open:hover .card-thumb{height:172px}
.cert-grid:not(.list-view) .cert-card.can-open:hover .card-body{padding-top:12px;padding-bottom:12px}

/* ═══════════════ SEARCH HIGHLIGHT ═══════════════ */
.hl{background:#fef08a;border-radius:3px;padding:0 1px}

/* ═══════════════ RIPPLE ═══════════════ */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(17,20,24,.09);
  transform:scale(0);animation:rippleA .55s linear;
  pointer-events:none;z-index:20;
}
@keyframes rippleA{to{transform:scale(4);opacity:0}}

/* ═══════════════ SKELETON ═══════════════ */
.skel-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.skel-thumb{height:160px;background:linear-gradient(90deg,#e8e6e0 0%,#f0ede8 50%,#e8e6e0 100%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-body{padding:16px}
.skel-line{height:11px;background:#e8e6e0;border-radius:6px;margin-bottom:9px}
.w80{width:80%}.w60{width:60%}.w40{width:40%}

/* ═══════════════ EMPTY ═══════════════ */
.empty-msg{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty-msg .icon{font-size:44px;margin-bottom:14px}
.empty-msg h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-msg p{font-size:13px}

/* ═══════════════ TOAST ═══════════════ */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--dark);color:#fff;
  padding:10px 22px;border-radius:12px;
  font-size:13px;font-weight:500;z-index:9999;pointer-events:none;
  box-shadow:0 8px 28px rgba(0,0,0,.24);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ═══════════════ BACK TO TOP ═══════════════ */
#backTop{
  position:fixed;bottom:24px;right:24px;
  width:40px;height:40px;border-radius:12px;
  background:var(--dark);color:#fff;border:none;
  font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;transition:all var(--tr);z-index:200;
}
#backTop.show{opacity:1;pointer-events:auto}
#backTop:hover{background:#252c38;transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.28)}
#backTop:active{transform:scale(.88)}

/* ═══════════════ FOOTER ═══════════════ */
footer{
  background:#fff;border-top:1px solid var(--border);
  padding:16px 40px;text-align:center;font-size:11px;color:var(--muted);
}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(max-width:680px){
  header{padding:0 16px}
  .hero{padding:36px 20px 32px}
  .hero h2{font-size:26px}
  .search-wrap{padding:10px 16px}
  main{padding:20px 16px}
  footer{padding:14px 16px}
  .stat{padding:10px 18px}
  .toolbar{flex-direction:column;align-items:flex-start}
  .cert-grid.list-view .cert-card{flex-direction:column;height:auto}
  .cert-grid.list-view .card-thumb{width:100%;height:130px}
  .cert-grid.list-view .cert-card.can-open:hover .card-thumb{width:100%}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo-mark" id="logoMark">N</div>
    <div class="header-titles">
      <h1 id="siteName">NTZ Creator</h1>
      <p id="siteTagline">Certificate Issuance System</p>
    </div>
  </div>
  <div class="header-actions">
    <div class="header-right" id="headerOrg"></div>
    <button class="btn-icon" title="Làm mới" onclick="refreshData()">↺</button>
    <button class="btn-icon" title="Sao chép link" onclick="copyLink()">🔗</button>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <div class="hero-badge" id="heroBadge">🎓 NTZ CREATOR · CERTIFICATE SYSTEM</div>
    <h2>Hệ thống cấp phát<br><span>Chứng chỉ Trực tuyến</span></h2>
    <p id="heroDesc">Đang tải thông tin...</p>
    <div class="hero-stats">
      <div class="stat" onclick="applyFilter('all')" title="Tất cả">
        <div class="num" id="statTotal">—</div><div class="lbl">Chứng chỉ</div>
      </div>
      <div class="stat" onclick="applyFilter('active')" title="Đang hoạt động">
        <div class="num" id="statActive">—</div><div class="lbl">Hoạt động</div>
      </div>
      <div class="stat" onclick="applyFilter('new')" title="Mới thêm">
        <div class="num" id="statNew">—</div><div class="lbl">Mới thêm</div>
      </div>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text"
             placeholder="Tìm kiếm chứng chỉ..."
             oninput="onSearch(this.value)" autocomplete="off">
      <span class="search-kbd" id="searchKbd">Ctrl K</span>
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-count" id="searchCount"></div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="section-header">
    <div>
      <div class="section-title">Danh sách chứng chỉ</div>
      <div class="section-sub" id="sectionSub">Đang tải...</div>
    </div>
    <div class="toolbar">
      <div class="filter-tabs">
        <button class="tab active" data-f="all"    onclick="applyFilter('all',this)">Tất cả</button>
        <button class="tab"        data-f="active"  onclick="applyFilter('active',this)">Hoạt động</button>
        <button class="tab"        data-f="new"     onclick="applyFilter('new',this)">Mới</button>
      </div>
      <div class="toolbar-sep"></div>
      <select class="sort-select" onchange="applySort(this.value)">
        <option value="default">Mặc định</option>
        <option value="name_az">Tên A → Z</option>
        <option value="name_za">Tên Z → A</option>
        <option value="expiry">Gần hết hạn trước</option>
      </select>
      <div class="toolbar-sep"></div>
      <div class="view-btns">
        <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Lưới">⊞</button>
        <button class="view-btn"        id="btnList" onclick="setView('list')" title="Danh sách">☰</button>
      </div>
    </div>
  </div>

  <div class="cert-grid" id="certGrid">
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>
  </div>
</main>

<footer id="siteFooter">© NTZ Creator</footer>
<div id="toast"></div>
<button id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Lên đầu">↑</button>

<script>
let allCerts=[], siteOrg='Cao Đẳng Đồng Tháp';
let currentFilter='all', currentSort='default', currentSearch='', currentView='grid';

function expiryInfo(str){
  if(!str)return{cls:'ok',label:'Không giới hạn',active:true};
  const diff=Math.ceil((new Date(str)-new Date())/86400000);
  if(diff<0)return{cls:'dead',label:'Đã hết hạn',active:false};
  if(diff<=30)return{cls:'warn',label:`Còn ${diff} ngày`,active:true};
  return{cls:'ok',label:`HSD: ${new Date(str).toLocaleDateString('vi-VN')}`,active:true};
}

function esc(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text,q){
  if(!q)return esc(text);
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<span class="hl">$1</span>');
}

/* Build thumb gradient based on cert color */
function thumbGradient(color, locked){
  if(locked) return `linear-gradient(145deg,#2a2a2a 0%,#1a1a1a 100%)`;
  // dark, near-black gradient with a hint of the cert color
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  return `linear-gradient(145deg,rgba(${r},${g},${b},.22) 0%,rgba(14,14,18,1) 100%)`;
}

function renderThumb(c, canOpen){
  const locked = !canOpen && !c.isNew;
  const hasBadge = c.badge !== null && c.badge !== undefined && c.badge !== '';

  /* If cert has image: show image centered, no emoji overlay */
  if(c.image){
    return `
      <div class="card-thumb-grad" style="background:${thumbGradient(c.color||'#555',locked)}"></div>
      <div class="thumb-img-wrap thumb-img-centered">
        <img class="thumb-img" src="${esc(c.image)}" alt="${esc(c.title)}" loading="lazy"
             onerror="this.style.display='none'">
      </div>`;
  }
  /* emoji: only if badge has a real value */
  if(hasBadge){
    return `
      <div class="card-thumb-grad" style="background:${thumbGradient(c.color||'#555',locked)}"></div>
      <span class="thumb-emoji">${c.badge}</span>`;
  }
  /* badge null + no image: just gradient background, no icon */
  return `<div class="card-thumb-grad thumb-grad-full" style="background:${thumbGradient(c.color||'#555',locked)}"></div>`;
}

/* ── Release date helpers ── */
function releaseInfo(str){
  if(!str) return null;
  const diff = new Date(str) - new Date();
  return { ms: diff, released: diff <= 0 };
}
function fmtCountdown(ms){
  if(ms <= 0) return null;
  const s = Math.floor(ms/1000);
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  const sc = s%60;
  if(d > 0) return `${d}n ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function renderCard(c, q=''){
  const exp      = expiryInfo(c.accessExpiry);
  const rel      = releaseInfo(c.releaseDate);
  const isSoon   = c.soon === true;
  // has release date and not yet released
  const hasCd    = rel && !rel.released;
  // can open: has url AND (no releaseDate OR already released) AND access not expired
  const canOpen  = !!c.url && exp.active;
  // soon-dated: soon=true AND has releaseDate not yet passed (hover enabled)
  const soonDated = isSoon && hasCd;
  const locked   = !canOpen;
  const hasImg   = !!c.image;

  const badgeNew  = c.isNew && !hasImg ? '<div class="badge-new">NEW</div>' : '';
  // COMING SOON badge: only when soon=true
  const badgeSoon = isSoon && !canOpen
    ? '<div class="badge-soon">COMING SOON</div>' : '';
  // Countdown badge on thumb (only when has releaseDate)
  const cdId = `cd-${c.id}`;
  const badgeRelease = hasCd
    ? `<div class="badge-release"><span class="cd-dot"></span><span id="${cdId}">${fmtCountdown(rel.ms)}</span></div>`
    : '';
  const expThumb = c.accessExpiry && !hasCd
    ? `<div class="badge-expiry-thumb">⏱ ${exp.label}</div>` : '';

  // Release row in body
  let releaseRow = '';
  if(rel){
    const dateStr = new Date(c.releaseDate).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
    if(hasCd){
      releaseRow = `<div class="release-row"><span class="rel-icon">🕐</span><span class="rel-label">Ra mắt sau</span><span class="rel-countdown" id="${cdId}-body">${fmtCountdown(rel.ms)}</span></div>`;
    } else {
      releaseRow = `<div class="release-row"><span class="rel-icon">✅</span><span class="rel-label">Đã ra mắt</span><span class="rel-val">${dateStr}</span></div>`;
    }
  }

  const expiryRow = c.accessExpiry && !hasCd
    ? `<div class="expiry-row"><div class="expiry-dot ${exp.cls}"></div><span>${exp.label}</span></div>` : '';

  let btn;
  if(canOpen){
    btn = `<button class="btn-go open" onclick="event.stopPropagation();go('${esc(c.url)}')">Tạo ngay →</button>`;
  } else if(exp.active === false){
    btn = `<button class="btn-go locked">🔒 Hết hạn</button>`;
  } else if(hasCd){
    btn = `<button class="btn-go locked">⏳ Chưa ra mắt</button>`;
  } else {
    btn = `<button class="btn-go locked">🔜 Sắp ra mắt</button>`;
  }

  let cardClass = 'cert-card';
  if(canOpen) cardClass += ' can-open';
  else if(soonDated) cardClass += ' soon-dated';
  else cardClass += ' locked-card';

  const onclick = canOpen ? `go('${esc(c.url)}')` : '';

  return `
  <div class="${cardClass}" onclick="${onclick}" data-new="${c.isNew}" data-active="${canOpen}" data-id="${esc(c.id)}">
    <div class="card-thumb">
      ${renderThumb(c, canOpen || soonDated)}
      ${badgeNew}
      ${badgeSoon}
      ${badgeRelease}
      ${expThumb}
    </div>
    <div class="card-body">
      <div class="card-label-row">
        <div class="card-dot" style="background:${canOpen?(c.color||'#555'):soonDated?(c.color||'#999'):'#bbb'}"></div>
        <span class="card-category">${canOpen?'Chứng chỉ':hasCd?'Sắp ra mắt':isSoon?'Sắp ra mắt':'Chứng chỉ'}</span>
      </div>
      <div class="card-title">${highlight(c.title,q)}</div>
      <div class="card-title-en">${esc(c.titleEn||'')}</div>
      <div class="card-desc">${highlight(c.description,q)}</div>
      ${releaseRow}
      ${expiryRow}
      <div class="card-footer">
        <div class="card-org">${esc(siteOrg)}</div>
        ${btn}
      </div>
    </div>
  </div>`;
}

/* ── Countdown ticker (updates every second) ── */
function tickCountdowns(){
  document.querySelectorAll('[data-id]').forEach(card=>{
    const id = card.dataset.id;
    const cert = allCerts.find(c=>c.id===id);
    if(!cert||!cert.releaseDate) return;
    const ms = new Date(cert.releaseDate) - new Date();
    if(ms <= 0) return;
    const txt = fmtCountdown(ms);
    const el1 = document.getElementById('cd-'+id);
    const el2 = document.getElementById('cd-'+id+'-body');
    if(el1) el1.textContent = txt;
    if(el2) el2.textContent = txt;
  });
}
setInterval(tickCountdowns, 1000);

function getList(){
  let list=[...allCerts];
  if(currentFilter==='active') list=list.filter(c=>c.url&&expiryInfo(c.accessExpiry).active);
  if(currentFilter==='new')    list=list.filter(c=>c.isNew);
  const q=currentSearch.toLowerCase().trim();
  if(q) list=list.filter(c=>
    c.title.toLowerCase().includes(q)||(c.titleEn||'').toLowerCase().includes(q)||c.description.toLowerCase().includes(q)
  );
  if(currentSort==='name_az') list.sort((a,b)=>a.title.localeCompare(b.title,'vi'));
  if(currentSort==='name_za') list.sort((a,b)=>b.title.localeCompare(a.title,'vi'));
  if(currentSort==='expiry')  list.sort((a,b)=>{
    const da=a.accessExpiry?new Date(a.accessExpiry):new Date('2099-01-01');
    const db=b.accessExpiry?new Date(b.accessExpiry):new Date('2099-01-01');
    return da-db;
  });
  return{list,q};
}

function renderGrid(){
  const {list,q}=getList();
  const countEl=document.getElementById('searchCount');
  const kbdEl=document.getElementById('searchKbd');
  if(q){
    countEl.textContent=`${list.length} kết quả`;countEl.style.display='block';
    if(kbdEl)kbdEl.style.display='none';
  }else{
    countEl.style.display='none';
    if(kbdEl)kbdEl.style.display='';
  }
  const grid=document.getElementById('certGrid');
  if(!list.length){
    grid.innerHTML=`<div class="empty-msg"><div class="icon">${q?'🔍':'📭'}</div>
      <h3>${q?'Không tìm thấy kết quả':'Không có chứng chỉ'}</h3>
      <p>${q?`Thử từ khóa khác cho <strong>"${esc(currentSearch)}"</strong>`:''}</p></div>`;
    return;
  }
  grid.innerHTML=list.map(c=>renderCard(c,q)).join('');
  addRipple();
}

function applyFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const target=btn||document.querySelector(`.tab[data-f="${f}"]`);
  if(target)target.classList.add('active');
  renderGrid();
}
function applySort(v){currentSort=v;renderGrid();}
function onSearch(val){
  currentSearch=val;
  document.getElementById('searchClear').classList.toggle('show',val.length>0);
  const kl=document.getElementById('searchKbd');
  if(kl)kl.style.display=val.length>0?'none':'';
  renderGrid();
}
function clearSearch(){
  currentSearch='';
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('searchCount').style.display='none';
  const kl=document.getElementById('searchKbd');if(kl)kl.style.display='';
  renderGrid();document.getElementById('searchInput').focus();
}
function setView(v){
  currentView=v;
  document.getElementById('certGrid').classList.toggle('list-view',v==='list');
  document.getElementById('btnGrid').classList.toggle('active',v==='grid');
  document.getElementById('btnList').classList.toggle('active',v==='list');
}
function go(url){window.location.href=url;}

function addRipple(){
  document.querySelectorAll('.cert-card.can-open').forEach(card=>{
    card.addEventListener('mousedown',function(e){
      const r=document.createElement('span');r.classList.add('ripple');
      const rect=this.getBoundingClientRect();
      const size=Math.max(rect.width,rect.height);
      r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(r);setTimeout(()=>r.remove(),650);
    },{passive:true});
  });
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);
}
function copyLink(){
  navigator.clipboard.writeText(location.href)
    .then(()=>showToast('✅ Đã sao chép đường dẫn!'))
    .catch(()=>showToast('❌ Không thể sao chép'));
}
async function refreshData(){showToast('🔄 Đang làm mới...');await init(true);}
window.addEventListener('scroll',()=>{
  document.getElementById('backTop').classList.toggle('show',scrollY>300);
},{passive:true});
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();const i=document.getElementById('searchInput');i.focus();i.select();}
  if(e.key==='Escape'&&document.activeElement===document.getElementById('searchInput'))clearSearch();
});
function animNum(id,target){
  const el=document.getElementById(id);let cur=0;
  const step=Math.ceil(target/18)||1;
  const iv=setInterval(()=>{cur=Math.min(cur+step,target);el.textContent=cur;if(cur>=target)clearInterval(iv);},40);
}
async function init(silent=false){
  try{
    const res=await fetch('config.json?t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const cfg=await res.json();const s=cfg.site;
    siteOrg=s.organizationVi;
    document.title=s.name+' — '+s.organizationVi;
    document.getElementById('siteName').textContent=s.name;
    document.getElementById('siteTagline').textContent=s.tagline;
    /* Logo image from config */
    const logoEl=document.getElementById('logoMark');
    if(s.logo){
      logoEl.innerHTML=`<img src="${esc(s.logo)}" alt="${esc(s.name)}" onerror="this.parentNode.innerHTML='${esc(s.name.charAt(0))}'">`;
    }else{
      logoEl.textContent=s.name.charAt(0).toUpperCase();
    }
    document.getElementById('heroDesc').textContent=s.description;
    document.getElementById('headerOrg').innerHTML=`<strong>${esc(s.organization)}</strong><br><span style="font-size:10px;opacity:.65">${esc(s.organizationVi)}</span>`;
    document.getElementById('siteFooter').textContent=s.footerNote;
    document.getElementById('heroBadge').textContent='🎓 '+s.name.toUpperCase()+' · CERTIFICATE SYSTEM';
    allCerts=cfg.certificates;
    const active=allCerts.filter(c=>c.url&&expiryInfo(c.accessExpiry).active);
    const newOnes=allCerts.filter(c=>c.isNew);
    animNum('statTotal',allCerts.length);
    animNum('statActive',active.length);
    animNum('statNew',newOnes.length);
    document.getElementById('sectionSub').textContent=`${allCerts.length} loại chứng chỉ · ${active.length} đang hoạt động`;
    renderGrid();
    if(silent)showToast('✅ Đã cập nhật!');
  }catch(e){
    document.getElementById('certGrid').innerHTML=
      `<div class="empty-msg"><div class="icon">⚠️</div><h3>Không tải được danh sách</h3>
       <p>Đảm bảo file <code>config.json</code> nằm cùng thư mục.<br><small>${e.message}</small></p></div>`;
  }
}
init();
</script>
</body>
</html>
